<!DOCTYPE html>
<html lang='es'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>MlnDownloader</title>
    <link rel='stylesheet' href='main.css'>

    <script>

        document.addEventListener("DOMContentLoaded", () => {

            const urlInput = document.querySelector("#urlInput");
            const chucksInput = document.querySelector("#chucksInput");
            const fileNameInput = document.querySelector("#fileNameInput");
            const pauseOrResumeInput = document.querySelector("#pauseOrResumeInput");
            const deleteInput = document.querySelector("#deleteInput");

            // const url = "https://releases.ubuntu.com/26.04/ubuntu-26.04-desktop-amd64.iso";
            // const file = "ubuntu-26.04-desktop-amd64.iso";
            const url = "https://es.mirrors.cicku.me/archlinux/iso/2026.05.01/archlinux-2026.05.01-x86_64.iso";
            const file = "archlinux-2026.05.01-x86_64.iso";

            urlInput.value = url;
            chucksInput.value = 4;
            fileNameInput.value = file;
            deleteInput.value = file;
            pauseOrResumeInput.value = file;


            urlInput.addEventListener("change", () => {
                try {
                    const url = new URL(urlInput.value);
                    const path = url.pathname;
                    const fileName = path.substring(path.lastIndexOf("/") + 1);

                    fileNameInput.value = fileName;
                } catch (e) {
                    fileNameInput.value = "";
                }
            })

            const btn = document.querySelector("#btn");
            btn.addEventListener("click", () => {
                console.log("START DOWNLOAD")

                const urlInputText = urlInput.value.trim()
                const chucksInputText = chucksInput.value.trim()
                const fileNameInputText = fileNameInput.value.trim()


                if (urlInputText == "") {
                    alert("Debes introducir una URL antes de continuar");
                    return;
                }

                if (chucksInputText == "") {
                    alert("Debes indicar cuantas partes simultáneas descargar");
                    return;
                }

                if (fileNameInputText == "") {
                    alert("Debes introducir un nombre de archivo");
                    return;
                }


                download(urlInput.value, chucksInput.value, fileNameInput.value);
            })

            const updateDownloadsBtn = document.querySelector("#updateDownloadsBtn");
            updateDownloadsBtn.addEventListener("click", () => {
                console.log("UPDATE DOWNLOAD")
                getAllDownloads();
            })

            const deleteDownloadBtn = document.querySelector("#deleteDownloadBtn");
            deleteDownloadBtn.addEventListener("click", () => {
                console.log("DELETE DOWNLOAD")
                deleteDownloaded();
            })


            const pauseOrResumeBtn = document.querySelector("#pauseOrResumeBtn");
            pauseOrResumeBtn.addEventListener("click", () => {
                console.log("PAUSE OR RESUME DOWNLOAD")
                pauseOrResumeDownload();
            })

            const cleanBtn = document.querySelector("#cleanBtn");
            cleanBtn.addEventListener("click", () => {
                console.log("CLEAN FINISH DOWNLOADS")
                cleanDownloads();
            })

        })

        async function getAllDownloads() {
            try {
                const response = await fetch("/api/downloads", {
                    method: "GET"
                });

                const data = await response.json();

                if (!data.success) {
                    alert(data.message)
                }

                console.log("Respuesta:", data.message);

            } catch (error) {
                console.error("Error:", error);
            }
        }


        async function download(urlInput, chucksInput, fileNameInput) {
            try {

                const response = await fetch("/api/downloads", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        uri: urlInput,
                        chunks: chucksInput,
                        fileName: fileNameInput
                    })
                });

                const data = await response.json();

                if (!data.success) {
                    alert(data.message)
                }

                console.log("Respuesta:", data.message);

            } catch (error) {
                console.error("Error:", error);
            }
        }


        async function deleteDownloaded() {
            try {

                const deleteInput = document.querySelector("#deleteInput").value;

                console.log(deleteInput)

                const response = await fetch("/api/downloads/" + deleteInput, {
                    method: "DELETE"
                });

                const data = await response.json();

                if (!data.success) {
                    alert(data.message)
                }

                console.log("Respuesta:", data.message);

            } catch (error) {
                console.error("Error:", error);
            }
        }


        async function pauseOrResumeDownload() {
            try {

                const fileName = document.querySelector("#pauseOrResumeInput").value;

                console.log(fileName)

                const response = await fetch("/api/downloads/" + fileName, {
                    method: "PUT"
                });

                const data = await response.json();

                if (!data.success) {
                    alert(data.message)
                }

                console.log("Respuesta:", data.message);

            } catch (error) {
                console.error("Error:", error);
            }
        }

        async function cleanDownloads() {
            try {

                const response = await fetch("/api/downloads", {
                    method: "DELETE"
                });

                const data = await response.json();

                if (!data.success) {
                    alert(data.message)
                }

                console.log("Respuesta:", data.message);

            } catch (error) {
                console.error("Error:", error);
            }
        }




    </script>
</head>

<body>
    <h1>MAIN WEB</h1>
    <button id="updateDownloadsBtn">UPDATE</button>
    <br>
    <input type="text" id="urlInput">
    <input type="number" id="chucksInput">
    <input type="text" id="fileNameInput">
    <button id="btn">DOWNLOAD</button>
    <br>
    <input type="text" id="deleteInput"><button id="deleteDownloadBtn">DELETE FROM LIST WITH FILE NAME</button>

    <br>
    <input type="text" id="pauseOrResumeInput"><button id="pauseOrResumeBtn">PAUSE OR RESUME</button>

    <br>
    <button id="cleanBtn">CLEAN DOWNLOADS</button>
</body>

</html>
